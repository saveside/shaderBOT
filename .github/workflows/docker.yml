name: Build and Push Docker Images

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
    paths:
      - 'src/**'
      - 'drizzle/**'
      - 'scripts/prod/docker/**'
      - 'Dockerfile'
      - 'package.json'
      - 'tsconfig.json'
      - 'bun.lock'
      - 'bun.lockb'
      - 'settings.template.jsonc'
      - '.github/workflows/docker.yml'
  workflow_dispatch:
    inputs:
      version_string:
        description: 'Custom version (optional)'
      is_latest:
        description: 'Apply "latest" tag to this build?'
        type: boolean
        default: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.versioning.outputs.version }}
      lower_repo: ${{ steps.repo_fix.outputs.repo }}
      is_semver: ${{ steps.versioning.outputs.is_semver }}
      is_latest: ${{ steps.versioning.outputs.is_latest }}
    steps:
      - name: Lowercase Repo Name
        id: repo_fix
        run: echo "repo=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Determine version
        id: versioning
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.version_string }}" ]]; then
            VERSION="${{ github.event.inputs.version_string }}"
            IS_SEMVER="true"
            IS_LATEST="${{ github.event.inputs.is_latest }}"
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
            IS_SEMVER="true"
            IS_LATEST="true"
          else
            BRANCH="${{ github.ref_name }}"
            BRANCH_SAFE="${BRANCH//\//-}"
            BRANCH_SAFE="${BRANCH_SAFE//[^a-zA-Z0-9._-]/}"
            BRANCH_SAFE="${BRANCH_SAFE,,}"
            SHA="${GITHUB_SHA:0:8}"
            VERSION="${BRANCH_SAFE}-${SHA}"
            IS_SEMVER="false"
            IS_LATEST="false"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "is_semver=$IS_SEMVER" >> $GITHUB_OUTPUT
          echo "is_latest=$IS_LATEST" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    strategy:
      matrix:
        include:
          - runs-on: ubuntu-latest
            platform: linux/amd64
            targetarch: amd64
          - runs-on: ubuntu-24.04-arm
            platform: linux/arm64
            targetarch: arm64
    runs-on: ${{ matrix.runs-on }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/${{ needs.prepare.outputs.lower_repo }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          echo "${{ steps.build.outputs.digest }}" > "${{ runner.temp }}/digests/${{ matrix.targetarch }}.digest"

      - name: Upload digest
        uses: actions/upload-artifact@v6
        with:
          name: digests-${{ matrix.targetarch }}
          path: ${{ runner.temp }}/digests/*
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: [prepare, build]
    permissions:
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v6
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ needs.prepare.outputs.lower_repo }}
          tags: |
            type=raw,value=latest,enable=${{ needs.prepare.outputs.is_latest == 'true' }}
            type=raw,value=${{ needs.prepare.outputs.version }},enable=${{ needs.prepare.outputs.version != 'main' }}
            type=semver,pattern=v{{version}},value=${{ needs.prepare.outputs.version }},enable=${{ needs.prepare.outputs.is_semver == 'true' }}
            type=semver,pattern=v{{major}}.{{minor}},value=${{ needs.prepare.outputs.version }},enable=${{ needs.prepare.outputs.is_semver == 'true' }}
            type=semver,pattern=v{{major}},value=${{ needs.prepare.outputs.version }},enable=${{ needs.prepare.outputs.is_semver == 'true' }}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          TAGS=$(echo "${{ steps.meta.outputs.tags }}" | xargs -I {} echo "-t {}")
          SOURCES=$(printf 'ghcr.io/${{ needs.prepare.outputs.lower_repo }}@%s ' $(cat *.digest))
          docker buildx imagetools create $TAGS $SOURCES